<html>
    <body>

        <h1>My Delivery Tracker</h1>
        <button onclick="saveOrder()">Save Order</button>
        <button onclick="startDelivery()">Start Delivery</button>

        <div>JSON Text: <span id="json-text"></span></div>
        <div>Loaded Item: <span id="loaded-item"></span></div>
        <div>Loaded Price: <span id="loaded-price"></span></div>
        <div>Status: <span id="status"></span></div>
        <div>Result: <span id="Result"></span></div>

        <script>

            let order = {
                item: "Pizza",
                price: 5,
                shop: "My Snack Shop"
            };


            function saveOrder() {
                let jsonText = JSON.stringify(order);
                let loadedOrder = JSON.parse(jsonText);

                document.getElementById("json-text").innerHTML = jsonText;
                document.getElementById("loaded-item").innerHTML = loadedOrder.item;
                document.getElementById("loaded-price").innerHTML = loadedOrder.price;

            }

            function delay(ms) {
                return new Promise(function (resolve) {
                    setTimeout(resolve, ms);
                });
            }


            async function startDelivery() {
                document.getElementById("status").innerHTML = "Delivery started...";
                await delay(2000);
                document.getElementById("status").innerHTML = "Order Recieved!";
            setTimeout(function(){
                document.getElementById("status").innerHTML = "Kitchen is Preparing";
            }, 1000);
        
        await delay(3000);
                document.getElementById("status").innerHTML = "Delivery completed!";
            }
        </script>
    </body>
</html>
