<html>
    <body>
    
        <h1>Lucky Draw</h1>
        <p>Enter your name and guess a number to win !</p>
    
                <input type="text" id="name" placeholder="Your name" required><br>
                <p id="msg-name"></p>
    
                <input type="number" id="guess" placeholder="Guess a number (1 to 10)" min="1" max="10" required><br>
                <p id="msg-guess"></p>
    
                <button onclick="checkForm()">Try My Luck !</button>
                        <p id="result"></p>
                        <p id="timer"></p>
                        <script>

                        var seconds = 0;
                        setInterval(function () {
                        seconds = seconds + 1;
                        document.getElementById("timer").textContent = "You have been here for " + seconds +" seconds!";
                        }, 1000);

                        function checkForm() {
                                var name = document.getElementById("name").value;
                                var guess = document.getElementById("guess").value;
                                var ok = true;

                                if (name == "") {
                                document.getElementById("msg-name").textContent = "Please enter your name";
                                    ok = false;
                                } else {
                                    document.getElementById("msg-name").textContent = "Great Name!";
                                    document.getElementById("msg-name").style.color = "green";
                                }
                               
                        }
                        if (guess == "") {
                        document.getElementById("msg-guess").textContent = "Please enter a guess!";
                            document.getElementById("msg-guess").style.color = "red";
                            ok = false;
                        } else 
                            document.getElementById("msg-guess").textContent = "Guess saved!";
                            document.getElementById("msg-guess").style.color = "green";
                    
                        if (ok) {
                            var randomNum = Math.floor(Math.random() * 10) + 1;
                            if (guess == randomNum) {
                                document.getElementById("result").textContent = "Congratulations " + name + "! You guessed the correct number: " + randomNum;
                                document.getElementById("result").style.color = "green";
                            } else {
                                document.getElementById("result").textContent = "Sorry " + name + ", you guessed " + guess + ". The correct number was: " + randomNum;
                                document.getElementById("result").style.color = "red";
                            }
                        }

</script>
                </body>
</html>
