<html>
    <body>
        <p id="student1"></p>
        <p id="student2"></p>
        <script>
            // Creating a class
            class Student {
                constructor(name, year) {
                    this.name = name;
                    this.year = year;
                }

                // Age Method
                age() {
                    let date= new Date();
                    return date.getFullYear() - this.year;
                }
            }

            // Using the class with two objects
            const student1 = new Student("Riya", 2014);
            const student2 = new Student("Amit", 2015);
            document.getElementById("student1").innerHTML = 
            "My name is " + student1.name + ". Iwas born in " + student1.year + ". And my age is " + student1.age();

            document.getElementById("student2").innerHTML = 
            "My name is " + student2.name + ". Iwas born in " + student2.year + ". And my age is " + student2.age();

        </script>
    </body>
</html>
